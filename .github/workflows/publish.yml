# Publishes @ddlqhd/agent-sdk using npm Trusted Publishing (OIDC). No NPM_TOKEN secret.
#
# One-time setup on https://www.npmjs.com/ → your package → Settings → Trusted publishing:
#   • Provider: GitHub Actions
#   • Repository + workflow filename: publish.yml (exact name and extension, case-sensitive)
#   • Optional: GitHub Environment name if you use environments
#
# Requires npm CLI ≥ 11.5.1 and Node ≥ 22.14 (see https://docs.npmjs.com/trusted-publishers ).
# package.json "repository.url" must match this GitHub repository URL.
#
# Usage:
#   • Or run this workflow manually via Actions → Publish to npm → Run workflow (after bumping version on the default branch).

name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Ensure npm CLI for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release tag matches package.json
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($TAG_NAME). Expected tag v$PKG_VERSION"
            exit 1
          fi

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test:run

      - name: Build
        run: pnpm build

      - name: Publish to npm
        # OIDC auth is applied during publish only; do not use npm whoami — it does not reflect OIDC.
        run: pnpm publish --access public --no-git-checks
